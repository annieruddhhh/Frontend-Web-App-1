<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HabitFlow — Add Habit</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>✅</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <span class="logo">HabitFlow</span>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="add-habit.html" class="active">Add Habit</a></li>
    </ul>
</nav>

<div class="page">

    <!-- left big title -->
    <div class="left">
        <h1>Add New Habit</h1>
        <p>Build your habits one day at a time.<br>Small steps lead to big changes.</p>
    </div>

    <!-- right form card -->
    <div id="add-form">

        <div class="field">
            <label>HABIT NAME</label>
            <input type="text" id="habit-name" placeholder="e.g. Drink 2L water">
        </div>

        <div class="field">
            <label>CATEGORY</label>
            <select id="habit-category">
                <option value="">Select Category</option>
                <option value="Health">Health</option>
                <option value="Fitness">Fitness</option>
                <option value="Study">Study</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="field">
            <label>FREQUENCY</label>
            <select id="habit-frequency">
                <option value="">Select Frequency</option>
                <option value="Daily">Daily</option>
                <option value="Weekly">Weekly</option>
            </select>
        </div>

        <p id="error-msg" class="error hidden"></p>
        <p id="success-msg" class="success hidden">
            Habit added! <a href="index.html">View all →</a>
        </p>

        <button id="add-btn" onclick="addHabit()">Add Habit</button>

    </div>
</div>

<script src="add-habit.js"></script>
</body>
</html>
