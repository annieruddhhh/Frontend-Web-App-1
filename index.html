<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- this makes the website look good on mobile too -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <!-- linking our css file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- top navigation bar -->
    <nav class="navbar">
        <h1>Habit Tracker</h1>
        <!-- search bar to filter habits -->
        <input type="text" id="search-bar" placeholder="Search habits..." />
    </nav>

    <!-- main content area -->
    <div class="container">

        <!-- stats section at the top -->
        <div class="stats-row">
            <div class="stat-box">
                <p class="stat-number" id="total-habits">0</p>
                <p class="stat-label">Total Habits</p>
            </div>
            <div class="stat-box">
                <p class="stat-number" id="done-today">0</p>
                <p class="stat-label">Done Today</p>
            </div>
            <div class="stat-box">
                <p class="stat-number" id="best-streak">0</p>
                <p class="stat-label">Best Streak</p>
            </div>
        </div>

        <!-- form to add a new habit -->
        <div class="form-section">
            <h2>Add a New Habit</h2>
            <div class="form-row">
                <!-- habit name input -->
                <input type="text" id="habit-name" placeholder="Habit name" />

                <!-- category dropdown -->
                <select id="habit-category">
                    <option value="">Select Category</option>
                    <option value="Health">Health</option>
                    <option value="Fitness">Fitness</option>
                    <option value="Study">Study</option>
                    <option value="Other">Other</option>
                </select>

                <!-- frequency dropdown -->
                <select id="habit-frequency">
                    <option value="">Select Frequency</option>
                    <option value="Daily">Daily</option>
                    <option value="Weekly">Weekly</option>
                </select>

                <!-- add button -->
                <button onclick="addHabit()">+ Add Habit</button>
            </div>

            <!-- error message shows here if validation fails -->
            <p id="form-error" style="color: red; margin-top: 8px;"></p>
        </div>

        <!-- this is where all habit cards will appear -->
        <h2 class="section-title">Your Habits</h2>
        <div id="habits-container">
            <!-- habit cards are added here by javascript -->
        </div>

    </div>

    <!-- linking our javascript file -->
    <!-- we put this at the bottom so html loads first -->
    <script src="app.js"></script>

</body>

</html>
