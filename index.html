<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <h1>Habit Tracker</h1>
        <input type="text" id="search-bar" placeholder="Search habits..." />
    </nav>

    <div class="container">

        <div class="stats-row">
            <div class="stat-box">
                <p class="stat-number" id="total-habits">0</p>
                <p class="stat-label">Total Habits</p>
            </div>
            <div class="stat-box">
                <p class="stat-number" id="done-today">0</p>
                <p class="stat-label">Done Today</p>
            </div>
            <div class="stat-box">
                <p class="stat-number" id="best-streak">0</p>
                <p class="stat-label">Best Streak</p>
            </div>
        </div>

        <div class="form-section">
            <h2>Add a New Habit</h2>
            <div class="form-row">
                <input type="text" id="habit-name" placeholder="Habit name" />

                <select id="habit-category">
                    <option value="">Select Category</option>
                    <option value="Health">Health</option>
                    <option value="Fitness">Fitness</option>
                    <option value="Study">Study</option>
                    <option value="Other">Other</option>
                </select>

                <select id="habit-frequency">
                    <option value="">Select Frequency</option>
                    <option value="Daily">Daily</option>
                    <option value="Weekly">Weekly</option>
                </select>

                <button onclick="addHabit()">+ Add Habit</button>
            </div>

            <p id="form-error" style="color: red; margin-top: 8px;"></p>
        </div>

        <h2 class="section-title">Your Habits</h2>
        <div id="habits-container"></div>

    </div>

    <script src="app.js"></script>
    <script src="home.js"></script>

</body>

</html>
